<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MolVis</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <h1>ORCA Energy + 3D Coordinates Viewer</h1>
      <section id="status" class="status">Loading parsed ORCA data...</section>

      <section class="timeline">
        <label for="frameSlider">Frame</label>
        <input id="frameSlider" type="range" min="0" max="0" value="0" />
        <span id="frameInfo">0 / 0</span>
        <button id="exportXyzBtn" class="toggle-btn" type="button" disabled>
          Show XYZ Text
        </button>
        <button id="toggleAtomIndexBtn" class="toggle-btn" type="button">
          Show Atom Indices
        </button>
      </section>

      <section id="xyzTextPanel" class="xyz-panel hidden">
        <div class="xyz-panel-head">
          <strong>Current Frame XYZ</strong>
          <button id="copyXyzBtn" class="toggle-btn" type="button">Copy</button>
        </div>
        <textarea
          id="xyzTextOutput"
          class="xyz-text"
          readonly
          spellcheck="false"
        ></textarea>
      </section>

      <section class="energy">
        <div>Energy (Hartree): <strong id="energyValue">N/A</strong></div>
        <span id="finalConvergenceBadge" class="convergence-badge unknown">
          Unknown
        </span>
      </section>

      <section class="energy-chart">
        <div class="energy-chart-header">Energy Trend</div>
        <div
          id="energyTrendChart"
          role="img"
          aria-label="Interactive energy trend chart"
        ></div>
        <div class="energy-chart-hint">
          Click a point to jump frame; drag or wheel to zoom.
        </div>
      </section>

      <section class="viewer-wrap">
        <button id="clearMeasureBtn" class="measure-clear-btn" type="button">
          Clear Measure
        </button>
        <section id="viewer" class="viewer"></section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
